    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.25s ease, border-color 0.2s ease, box-shadow 0.2s;
        }

        /* 🌟 LIGHT THEME (default) */
        :root {
            --bg-page: #f8f4eb;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(180, 150, 100, 0.3);
            --text-primary: #2d2a24;
            --text-soft: #6b4f3c;
            --accent-gold: #b8860b;
            --soft-gold: #e3c994;
            --btn-hd: linear-gradient(135deg, #a48144 0%, #c9a459 100%);
            --btn-4k: linear-gradient(135deg, #b37b48 0%, #e0b87b 100%);
            --btn-share: linear-gradient(135deg, #1f7a5a 0%, #2e9c77 100%);
            --card-bg-gradient: linear-gradient(135deg, #f9efd7 0%, #f3e1c0 100%);
            --input-bg: rgba(255, 250, 240, 0.7);
            --modal-bg: #f0e7d6;
            --star-color: #b8860b;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        /* 🌙 DARK THEME */
        body.dark {
            --bg-page: #0c0f1a;
            --glass-bg: rgba(25, 30, 45, 0.7);
            --glass-border: rgba(212, 175, 55, 0.25);
            --text-primary: #f0e9dd;
            --text-soft: #c9b696;
            --accent-gold: #e4b138;
            --soft-gold: #7e6b42;
            --btn-hd: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --btn-4k: linear-gradient(135deg, #b8860b 0%, #e6b422 100%);
            --btn-share: linear-gradient(135deg, #0f5e4b 0%, #149e75 100%);
            --card-bg-gradient: linear-gradient(135deg, #1a1f2e 0%, #262d42 100%);
            --input-bg: rgba(20, 25, 40, 0.8);
            --modal-bg: #242b3a;
            --star-color: #dbb05c;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Tajawal', 'Cairo', 'Reem Kufi', sans-serif;
            direction: rtl;

            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }

        #stars {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.7;
        }

        .container {
            z-index: 5;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Header with toggle */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 15px 8px 8px;
            border: 1px solid var(--glass-border);
        }

        * {
            font-feature-settings: "liga" 1;
            text-rendering: optimizeLegibility;
        }

        h1 {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(to left,
                    var(--accent-gold),
                    var(--soft-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--accent-gold);
            box-shadow: var(--shadow);
            transition: 0.2s;
        }

        .editor-box {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-label {
            font-size: 0.85rem;
            color: var(--text-soft);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: -5px;
            letter-spacing: 0.3px;
        }

        input,
        textarea {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 18px;
            color: var(--text-primary);
            font-family: 'Tajawal', 'Cairo', 'Reem Kufi', sans-serif;
            direction: rtl;

            width: 100%;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: var(--glass-bg);
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bg-selector,
        .shape-selector {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 5px 2px;
            scrollbar-width: none;
            flex: 1;
        }

        .bg-selector::-webkit-scrollbar,
        .shape-selector::-webkit-scrollbar {
            display: none;
        }

        .bg-option,
        .bg-add-btn,
        .shape-option {
            flex: 0 0 55px;
            height: 55px;
            border-radius: 16px;
            cursor: pointer;
            border: 2px solid transparent;
            background-size: cover;
            background-position: center;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: 1.4rem;
        }

        .active {
            border-color: var(--accent-gold) !important;
            box-shadow: 0 0 12px var(--accent-gold);
            transform: scale(1.02);
        }

        .nav-btn {
            background: var(--glass-border);
            border: none;
            color: var(--text-primary);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }

        .preview-area {
            width: 100%;
            aspect-ratio: 1080 / 1350;
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }

        .scale-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 1080px;
            height: 1350px;
            transform-origin: top left;
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg-gradient);
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
        }

        .photo-frame {
            width: 580px;
            height: 600px;

            padding: 15px;
            background: rgba(255, 250, 240, 0.25);

            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);

            display: none;
            position: relative;
        }

        .photo-inner {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .user-photo-final {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* shapes attached via class */

        /* RECT */
        .shape-rect,
        .shape-rect .photo-inner {
            border-radius: 0.5rem;
            clip-path: none;
        }

        /* ARCH */
        .shape-arch,
        .shape-arch .photo-inner {
            clip-path: polygon(0 100%, 0 20%, 50% 0, 100% 20%, 100% 100%);
        }

        /* CIRCLE */
        .shape-circle,
        .shape-circle .photo-inner {
            border-radius: 50%;
            clip-path: circle(50%);
        }

        /* STAR */
        .shape-star,
        .shape-star .photo-inner {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%,
                    50% 75%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        /* ISLAMIC */
        .shape-islamic,
        .shape-islamic .photo-inner {
            clip-path: polygon(50% 0%, 61% 12%, 80% 10%, 88% 28%, 100% 35%,
                    95% 53%, 100% 70%, 85% 82%, 75% 100%, 50% 90%,
                    25% 100%, 15% 82%, 0% 70%, 5% 53%, 0% 35%,
                    12% 28%, 20% 10%, 39% 12%);
        }

        /* HEART */
        .shape-heart,
        .shape-heart .photo-inner {
            clip-path: polygon(50% 0%, 93% 35%, 80% 100%, 50% 80%, 20% 100%, 7% 35%);
        }

        /* DIAMOND */
        .shape-diamond,
        .shape-diamond .photo-inner {
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        /* PENTAGON */
        .shape-pentagon,
        .shape-pentagon .photo-inner {
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }

        /* HEXAGON */
        .shape-hexagon,
        .shape-hexagon .photo-inner {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        /* OCTAGON */
        .shape-octagon,
        .shape-octagon .photo-inner {
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
        }

        /* LEAF */
        .shape-leaf,
        .shape-leaf .photo-inner {
            clip-path: polygon(50% 0%, 80% 20%, 100% 50%, 80% 80%, 50% 100%, 20% 80%, 0% 50%, 20% 20%);
        }

        /* ---------------------- */
        /* NEW SHAPES */
        /* ---------------------- */

        /* FLOWER */
        .shape-flower,
        .shape-flower .photo-inner {
            clip-path: polygon(50% 0%, 65% 20%, 90% 20%, 75% 45%,
                    90% 70%, 65% 70%, 50% 100%, 35% 70%,
                    10% 70%, 25% 45%, 10% 20%, 35% 20%);
        }

        /* CLOUD */
        .shape-cloud,
        .shape-cloud .photo-inner {
            clip-path: polygon(20% 70%, 10% 55%, 20% 40%, 35% 40%,
                    40% 25%, 60% 25%, 65% 40%, 80% 40%,
                    90% 55%, 80% 70%, 60% 75%, 40% 75%);
        }

        /* STARBURST */
        .shape-burst,
        .shape-burst .photo-inner {
            clip-path: polygon(50% 0%, 60% 30%, 90% 20%, 70% 50%,
                    90% 80%, 60% 70%, 50% 100%, 40% 70%,
                    10% 80%, 30% 50%, 10% 20%, 40% 30%);
        }

        /* ROUNDED DIAMOND */
        .shape-rounded-diamond,
        .shape-rounded-diamond .photo-inner {
            clip-path: polygon(50% 0%, 85% 50%, 50% 100%, 15% 50%);
            border-radius: 20px;
        }

        /* RAMADAN LANTERN */
        .shape-lantern,
        .shape-lantern .photo-inner {
            clip-path: polygon(50% 0%, 65% 10%, 65% 25%, 80% 35%,
                    80% 75%, 65% 90%, 35% 90%, 20% 75%,
                    20% 35%, 35% 25%, 35% 10%);
        }

        /* CRESCENT MOON */
        .shape-crescent,
        .shape-crescent .photo-inner {
            clip-path: polygon(60% 0%, 80% 10%, 95% 35%, 95% 65%,
                    80% 90%, 60% 100%, 40% 95%, 55% 75%,
                    60% 50%, 55% 25%, 40% 5%);
        }

        /* ISLAMIC 8 STAR */
        .shape-islamic-star,
        .shape-islamic-star .photo-inner {
            clip-path: polygon(50% 0%, 60% 20%, 80% 20%, 70% 40%,
                    100% 50%, 70% 60%, 80% 80%, 60% 80%,
                    50% 100%, 40% 80%, 20% 80%, 30% 60%,
                    0% 50%, 30% 40%, 20% 20%, 40% 20%);
        }

        /* MOSQUE */
        .shape-mosque,
        .shape-mosque .photo-inner {
            clip-path: polygon(0% 100%, 0% 55%, 10% 55%, 10% 25%,
                    18% 25%, 18% 55%, 35% 55%, 50% 35%,
                    65% 55%, 82% 55%, 82% 25%, 90% 25%,
                    90% 55%, 100% 55%, 100% 100%);
        }

        .greeting-line {
            font-size: 38px;
            line-height: 1.6;
            margin: 6px 0;
            font-weight: 500;
            color: var(--text-primary);
        }

        .greeting-line:first-child {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-gold);
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .text-content-wrapper {
            position: absolute;
            bottom: 100px;
            width: 100%;
            padding: 0 60px;
        }

        .generated-greeting {
            direction: rtl;
            unicode-bidi: plaintext;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 50px;
            border: 2px solid var(--accent-gold);
            text-align: center;
            color: var(--text-primary);
            font-size: 38px;
            line-height: 1.6;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .highlight-gold {
            color: var(--accent-gold);
            font-weight: 800;
            display: block;
            margin-bottom: 10px;
            font-size: 48px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .sender-block {
            direction: rtl;
            unicode-bidi: plaintext;
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid var(--accent-gold);

            font-size: 44px;
            /* larger */
            font-weight: 900;

            color: var(--accent-gold);


            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 5px;
        }

        .btn {
            border: none;
            padding: 16px 5px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: 0.2s;
            font-size: 0.9rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
        }

        .btn-hd {
            background: var(--btn-hd);
        }

        .btn-4k {
            background: var(--btn-4k);
        }

        .btn-share {
            background: var(--btn-share);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* crop modal */
        .crop-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 15px;
        }

        .crop-content {
            background: var(--modal-bg);
            padding: 20px;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            border: 2px solid var(--accent-gold);
        }

        #imageToCrop {
            max-width: 100%;
            max-height: 280px;
        }

        .theme-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }

        .theme-btn {
            padding: 6px 12px;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .theme-btn:hover,
        .theme-btn.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
        }
    </style>
</head>

<body>
    <canvas id="stars"></canvas>

    <!-- CROP MODAL -->
    <div id="cropModal" class="crop-modal">
        <div class="crop-content">
            <h3 style="margin-bottom:20px; color:var(--accent-gold); text-align:center;">✂️ قص الصورة</h3>
            <div style="max-height:280px; overflow:hidden; border-radius:20px; background:#000; margin-bottom:20px;">
                <img id="imageToCrop" style="width:100%;">
            </div>
            <div style="display:flex; gap:12px;">
                <button id="btnCancelCrop" class="btn" style="background:#5f5f5f; flex:1;">إلغاء</button>
                <button id="btnFinalCrop" class="btn btn-4k" style="flex:2;">تطبيق</button>
            </div>
        </div>
    </div>

    <main class="container">
        <!-- Header with toggle -->

    <script>
        (function () {
            // ---------- CONSTANTS & STATE ----------
            const defaultMsg = `عيد فطر مبارك
كل عام وأنتم بخير
تقبل الله طاعتكم
وجعل أيامكم فرحًا وسعادة
أعاده الله عليكم بالخير واليمن والبركات`;
            let cropper = null;

            // UI Elements
            const toInput = document.getElementById('inputToName');
            const msgInput = document.getElementById('inputGreeting');
            const fromInput = document.getElementById('inputSenderName');
            const displayDiv = document.getElementById('displayGreetingText');
            const photoFrame = document.getElementById('photoFrame');
            const finalPhoto = document.getElementById('finalPhotoDisplay');
            const cardDiv = document.getElementById('card');
            const bgUpload = document.getElementById('bgUpload');
            const photoUpload = document.getElementById('photoUpload');
            const cropModal = document.getElementById('cropModal');
            const imageToCrop = document.getElementById('imageToCrop');
            const themeToggle = document.getElementById('themeToggleBtn');
            const themeIcon = document.getElementById('themeIcon');
            const body = document.body;


            // ---------- THEME TOGGLE ----------
            function setTheme(theme) {
                if (theme === 'dark') {
                    body.classList.add('dark');
                    themeIcon.className = 'fa-regular fa-moon';
                } else {
                    body.classList.remove('dark');
                    themeIcon.className = 'fa-regular fa-sun';
                }
                initStars(); drawStars(); // redraw stars with new color
            }

            themeToggle.addEventListener('click', () => {
                if (body.classList.contains('dark')) {
                    setTheme('light');
                } else {
                    setTheme('dark');
                }
            });

            // ---------- CARD TEXT UPDATE ----------
            function updateUI() {
                const to = toInput.value.trim() || "";
                const msg = msgInput.value.trim() || defaultMsg;
                const from = fromInput.value.trim() || "";

                const toHtml = to ? `<span class="highlight-gold">${to}</span>` : "";
                const senderHtml = from ? `<div class="sender-block">${from}</div>` : "";

                // قسم الرسالة إلى أسطر
                const msgLines = (msgInput.value.trim() || defaultMsg)
                    .split('\n')
                    .map(line => `<div class="greeting-line">${line.trim()}</div>`)
                    .join('');

                displayDiv.innerHTML = `${toHtml}${msgLines}${senderHtml}`;

                resizePreview();
            }

            // ---------- SLIDER SCROLL ----------
            window.slideSlider = (id, amt) => {
                document.getElementById(id).scrollBy({ left: amt, behavior: 'smooth' });
            };

            // ---------- SHAPE SELECTION ----------
            document.querySelectorAll('.shape-option').forEach(opt => {
                opt.addEventListener('click', function () {
                    document.querySelector('.shape-option.active')?.classList.remove('active');
                    this.classList.add('active');
                    const shape = this.dataset.shape;
                    photoFrame.className = `photo-frame ${shape}`;
                });
            });

            // ---------- BACKGROUND SELECTION (ملفات محلية) ----------
            document.querySelectorAll('.bg-option').forEach(opt => {
                opt.addEventListener('click', function () {
                    document.querySelector('.bg-option.active')?.classList.remove('active');
                    this.classList.add('active');
                    const bg = this.dataset.bg; // could be "./1.jpg" or "gradient"
                    if (bg === 'gradient') {
                        cardDiv.style.backgroundImage = 'var(--card-bg-gradient)';
                    } else {
                        // نعاملها كـ url صورة (ملف محلي)
                        cardDiv.style.backgroundImage = `url('${bg}')`;
                    }
                });
            });

            // ---------- CUSTOM BG UPLOAD ----------
            bgUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    cardDiv.style.backgroundImage = `url(${url})`;
                    // remove active class from gradient
                    document.querySelector('.bg-option.active')?.classList.remove('active');
                }
            });

            // ---------- PHOTO UPLOAD + CROP ----------
            photoUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imageToCrop.src = ev.target.result;
                    cropModal.style.display = 'flex';
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1,
                        viewMode: 1,
                        background: false,
                        modal: true,
                    });
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('btnFinalCrop').addEventListener('click', () => {
                if (!cropper) return;
                const canvas = cropper.getCroppedCanvas({ width: 800, height: 800 });
                finalPhoto.src = canvas.toDataURL('image/png');
                photoFrame.style.display = 'block';  // show frame
                cropModal.style.display = 'none';
            });

            document.getElementById('btnCancelCrop').addEventListener('click', () => {
                cropModal.style.display = 'none';
            });

            // ---------- RESIZE PREVIEW ----------
            function resizePreview() {
                const container = document.getElementById('previewContainer');
                if (!container) return;
                const scale = container.offsetWidth / 1080;
                document.getElementById('scaleWrapper').style.transform = `scale(${scale})`;
            }

            // ---------- HELPER: INTERNAL CAPTURE ----------
            async function captureCard(multiplier) {

                // RECT: التأكد من تحميل جميع الخطوط قبل التصدير
                if (document.fonts && document.fonts.ready) {
                    await document.fonts.ready;
                }

                const card = document.getElementById("card");
                const scaleWrapper = document.getElementById("scaleWrapper");

                // حفظ الـ transform الحالي
                const originalTransform = scaleWrapper.style.transform;

                // إزالة أي scale من المعاينة
                scaleWrapper.style.transform = "scale(1)";

                // تثبيت الأبعاد الحقيقية للبطاقة
                const originalWidth = card.style.width;
                const originalHeight = card.style.height;

                card.style.width = "1080px";
                card.style.height = "1350px";

                // Force style for html2canvas
                const frame = document.getElementById("photoFrame");
                const computed = window.getComputedStyle(frame);

                frame.style.clipPath = computed.clipPath;
                frame.style.borderRadius = computed.borderRadius;

                const canvas = await html2canvas(card, {
                    scale: multiplier,
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: null,

                    width: 1080,
                    height: 1350,

                    windowWidth: 1080,
                    windowHeight: 1350,

                    imageSmoothingEnabled: true,

                    scrollX: 0,
                    scrollY: 0
                });

                // إعادة القيم الأصلية
                card.style.width = originalWidth;
                card.style.height = originalHeight;
                scaleWrapper.style.transform = originalTransform;

                return canvas;
            }

            // ---------- EXPORT IMAGE ----------
            window.exportImage = async function (q) {
                const btn = event.currentTarget;
                const oldHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa fa-spinner fa-pulse"></i>';

                try {
                    const canvas = await captureCard(q);
                    const link = document.createElement('a');
                    link.download = `Eid_Card_${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                } catch (err) {
                    console.error(err);
                    alert('حدث خطأ أثناء التصدير');
                } finally {
                    btn.innerHTML = oldHtml;
                }
            };

            // ---------- SHARE ----------
            window.shareCard = async function () {
                const btn = event.currentTarget;
                const oldHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa fa-spinner fa-pulse"></i>';

                try {
                    // Use 1.5 multiplier for a high-quality share (1620x2025) 
                    // that isn't a massive file size.
                    const canvas = await captureCard(1.5);

                    canvas.toBlob(async (blob) => {
                        if (!blob) return;
                        const file = new File([blob], 'eid_card.png', { type: 'image/png' });

                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                files: [file],
                                title: 'بطاقة العيد',
                                text: 'كل عام وأنتم بخير ✨'
                            });
                        } else {
                            alert('المشاركة المباشرة غير مدعومة. يرجى تحميل الصورة أولاً.');
                        }
                    }, 'image/png', 0.9);
                } catch (err) {
                    console.error(err);
                } finally {
                    btn.innerHTML = oldHtml;
                }
            };

            // ---------- STARS BACKGROUND ----------
            const sCanvas = document.getElementById('stars');
            const sctx = sCanvas.getContext('2d');
            let stars = [];

            function initStars() {
                sCanvas.width = window.innerWidth;
                sCanvas.height = window.innerHeight;
                stars = Array.from({ length: 50 }, () => ({
                    x: Math.random() * sCanvas.width,
                    y: Math.random() * sCanvas.height,
                    s: Math.random() * 2.5 + 1
                }));
            }

            function drawStars() {
                sctx.clearRect(0, 0, sCanvas.width, sCanvas.height);
                const baseColor = body.classList.contains('dark') ? '#e4b138' : '#b8860b';
                stars.forEach(s => {
                    let opacity = (Math.sin(Date.now() * 0.002 + s.x) + 1) / 2 * 0.8;
                    sctx.fillStyle = `rgba(${parseInt(baseColor.slice(1, 3), 16)}, ${parseInt(baseColor.slice(3, 5), 16)}, ${parseInt(baseColor.slice(5, 7), 16)}, ${opacity})`;
                    sctx.beginPath();
                    sctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
                    sctx.fill();
                });
                requestAnimationFrame(drawStars);
            }

            window.addEventListener('resize', () => {
                initStars();
                resizePreview();
            });

            // ---------- INIT ----------
            [toInput, msgInput, fromInput].forEach(el => el.addEventListener('input', updateUI));
            window.addEventListener('load', () => {
                updateUI();
                resizePreview();
                initStars();
                drawStars();
                // Hide frame initially if no real photo
                if (!finalPhoto.src || finalPhoto.src.includes('svg')) photoFrame.style.display = 'none';
            });

            finalPhoto.addEventListener('load', () => { if (finalPhoto.src && !finalPhoto.src.includes('svg')) photoFrame.style.display = 'block'; });
        })();
    </script>
</body>

</html>
